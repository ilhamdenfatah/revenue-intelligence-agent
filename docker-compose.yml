version: "3.8"
services:
  app:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data
    ports:
      - "8501:8501"
  n8n:
    image: n8nio/n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin
    volumes:
      - n8n_data:/home/node/.n8n
volumes:
  n8n_data:
